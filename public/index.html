<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Duck Fight!</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    background: #0f0c29;
    display: flex; flex-direction: column;
    justify-content: center; align-items: center;
    width: 100%; height: 100vh; height: 100dvh;
    overflow: hidden;
    font-family: monospace; color: #fff;
  }
  #game-wrapper {
    position: relative;
    width: 100%; flex: 1;
    display: flex; justify-content: center; align-items: center;
    overflow: hidden;
  }
  canvas {
    border: 2px solid #e94560;
    cursor: crosshair;
    image-rendering: pixelated;
    display: block;
    touch-action: none;
    /* Default: auto-scaled via JS */
  }
  #joystick-zone {
    display: none;
    position: fixed;
    left: 20px;
    bottom: 20px;
    width: 140px;
    height: 140px;
    z-index: 100;
    pointer-events: auto;
    touch-action: none;
  }
  #joystick-base {
    position: absolute;
    width: 140px; height: 140px;
    border-radius: 50%;
    background: rgba(255,255,255,0.08);
    border: 3px solid rgba(255,255,255,0.2);
    box-sizing: border-box;
  }
  #joystick-knob {
    position: absolute;
    width: 56px; height: 56px;
    border-radius: 50%;
    background: rgba(255,255,255,0.25);
    border: 2px solid rgba(255,255,255,0.45);
    left: 42px; top: 42px;
    transition: none;
    box-sizing: border-box;
  }
  @media (max-width: 1024px), (hover: none) and (pointer: coarse) {
    #joystick-zone { display: block; }
    canvas { cursor: default; }
  }
  #status {
    margin-bottom: 10px; font-size: 16px;
    padding: 6px 16px; background: #1a1a3e; border-radius: 6px;
    border: 1px solid #333;
    z-index: 200;
  }
  #lobby-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(15, 12, 41, 0.85);
    z-index: 500;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    text-align: center;
    color: #fff;
    font-family: monospace;
    padding: 20px;
  }
  #lobby-overlay.show { display: flex; }
  #lobby-overlay h1 { font-size: 28px; margin-bottom: 12px; color: #ffcc00; }
  #lobby-overlay p { font-size: 16px; margin: 4px 0; }
  #lobby-overlay .pos { color: #ffaa00; font-weight: bold; font-size: 22px; margin: 16px 0; }
  #lobby-overlay .dots { font-size: 32px; letter-spacing: 4px; margin-top: 12px; }
  #spawning-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(15, 12, 41, 0.85);
    z-index: 600;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    text-align: center;
    color: #fff;
    font-family: monospace;
    padding: 20px;
  }
  #spawning-overlay.show { display: flex; }
  #spawning-overlay .color { font-size: 44px; font-weight: 900; margin: 8px 0; letter-spacing: 2px; text-shadow: 0 0 20px currentColor; }
  #spawning-overlay .countdown { font-size: 80px; font-weight: 900; margin-top: 20px; color: #ffcc00; text-shadow: 0 0 30px #ffcc00; transition: transform 0.15s ease-out; }
  #spawning-overlay .sub { font-size: 18px; margin-top: 12px; color: #aaaacc; }
  .waiting { color: #ffcc00; }
  .connected { color: #2ecc71; }
  .dead { color: #e74c3c; }
</style>
</head>
<body>
<div id="status" class="waiting">Connecting...</div>
<div id="spawning-overlay">
  <div class="sub">YOU ARE THE</div>
  <div class="color" id="spawning-color">??? DUCK</div>
  <div class="sub">Spawning in</div>
  <div class="countdown" id="spawning-countdown">3</div>
</div>
<div id="lobby-overlay">
  <h1>⏳ IN LOBBY</h1>
  <p>Waiting for a player to die...</p>
  <div class="pos" id="lobby-position">Position: --</div>
  <p id="lobby-gameinfo">--</p>
  <div class="dots" id="lobby-dots">• • •</div>
</div>
<div id="game-wrapper">
  <canvas id="game"></canvas>
</div>
<div id="joystick-zone">
  <div id="joystick-base">
    <div id="joystick-knob"></div>
  </div>
</div>
<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const statusEl = document.getElementById('status');
const gameWrapper = document.getElementById('game-wrapper');

// Internal resolution is always 960x640 (game world)
canvas.width = 960;
canvas.height = 640;

// ── Responsive scaling ──
function resizeCanvas() {
  const wrapperW = gameWrapper.clientWidth;
  const wrapperH = gameWrapper.clientHeight;
  const gameAspect = 960 / 640; // 1.5
  const screenAspect = wrapperW / wrapperH;

  let drawW, drawH;
  if (screenAspect > gameAspect) {
    // Taller relative to width — fit to height
    drawH = wrapperH;
    drawW = drawH * gameAspect;
  } else {
    // Wider relative to height — fit to width
    drawW = wrapperW;
    drawH = drawW / gameAspect;
  }

  canvas.style.width = Math.floor(drawW) + 'px';
  canvas.style.height = Math.floor(drawH) + 'px';
}

resizeCanvas();
window.addEventListener('resize', resizeCanvas);
window.addEventListener('orientationchange', () => setTimeout(resizeCanvas, 150));

// ── WebSocket ──
const protocol = location.protocol === 'https:' ? 'wss' : 'ws';
const ws = new WebSocket(`${protocol}://${location.host}`);
let myId = null;
let mySlot = -1;
let platforms = [];
let serverState = { players: {}, bullets: [], events: [] };
let connected = false;
let inLobby = false;
let lobbyPos = 0;
let gameInfo = { inGame: 0, maxGame: 4, lobbyCount: 0 };

// ── Color config for slots 0-3 ──
const SLOT_COLORS = [
  { name: 'BLUE',   body: '#4488ff', dark: '#2266cc', light: '#88bbff', icon: '🔵',
    gunBody: '#4466aa', gunBarrel: '#335599', gunHighlight: '#5577bb',
    deathPal: ['#4488ff','#66aaff','#2266dd','#ffffff'] },
  { name: 'RED',    body: '#ee4444', dark: '#bb2222', light: '#ff8888', icon: '🔴',
    gunBody: '#aa4444', gunBarrel: '#993333', gunHighlight: '#bb5555',
    deathPal: ['#ff4444','#ff6666','#dd2222','#ffffff'] },
  { name: 'YELLOW', body: '#f5c542', dark: '#d4a830', light: '#fae08a', icon: '🟡',
    gunBody: '#b89930', gunBarrel: '#997a20', gunHighlight: '#d4b050',
    deathPal: ['#f5c542','#fae08a','#d4a830','#ffffff'] },
  { name: 'GREEN',  body: '#2d7a3a', dark: '#1a5525', light: '#5faa6a', icon: '🟢',
    gunBody: '#3a6a3a', gunBarrel: '#2a4a2a', gunHighlight: '#5a8a5a',
    deathPal: ['#2d7a3a','#5faa6a','#1a5525','#ffffff'] },
];
function slotColor(slot) { return SLOT_COLORS[slot] || SLOT_COLORS[0]; }

const lobbyOverlay = document.getElementById('lobby-overlay');
const lobbyPositionEl = document.getElementById('lobby-position');
const lobbyGameInfoEl = document.getElementById('lobby-gameinfo');
const lobbyDotsEl = document.getElementById('lobby-dots');
const spawningOverlay = document.getElementById('spawning-overlay');
const spawningColorEl = document.getElementById('spawning-color');
const spawningCountdownEl = document.getElementById('spawning-countdown');

// Spawning countdown state
let spawningActive = false;
let spawningStart = 0;
const SPAWN_COUNTDOWN_MS = 3000;

ws.onopen = () => { statusEl.textContent = 'Connecting...'; statusEl.className = 'waiting'; };
ws.onclose = () => { statusEl.textContent = 'Disconnected'; statusEl.className = 'dead'; connected = false; };
ws.onerror = () => { statusEl.textContent = 'Connection error'; statusEl.className = 'dead'; };

ws.onmessage = (e) => {
  const msg = JSON.parse(e.data);

  if (msg.type === 'init') {
    myId = msg.id;
    mySlot = msg.slot;
    platforms = msg.platforms;
    connected = true;
    inLobby = false;
    lobbyOverlay.classList.remove('show');
    // Show spawning overlay for 3s (always shown on fresh join too)
    const sc = slotColor(mySlot);
    startSpawningCountdown(sc);
    statusEl.textContent = `You are ${sc.icon} ${sc.name} Duck — Waiting for players...`;
    statusEl.className = 'waiting';
  }

  if (msg.type === 'spawned') {
    // Server says this player is now playable. Server already granted 1.5s invuln.
    if (msg.id === myId) {
      statusEl.textContent = `You are ${slotColor(mySlot).icon} ${slotColor(mySlot).name} Duck — FIGHT!`;
      statusEl.className = 'connected';
    }
  }

  if (msg.type === 'lobby') {
    inLobby = true;
    myId = msg.id;
    mySlot = -1;
    const ig = msg.inGame ?? 0;
    const mg = msg.maxGame ?? 4;
    const lc = msg.lobbyCount ?? msg.position ?? 0;
    gameInfo.inGame = ig;
    gameInfo.maxGame = mg;
    gameInfo.lobbyCount = lc;
    lobbyPos = msg.position;
    lobbyOverlay.classList.add('show');
    lobbyPositionEl.textContent = `Queue Position: #${msg.position}`;
    lobbyGameInfoEl.textContent = `${ig} / ${mg} players in game · ${lc} waiting`;
    statusEl.textContent = 'In Lobby — waiting to join';
    statusEl.className = 'waiting';
  }

  if (msg.type === 'promoted') {
    inLobby = false;
    myId = msg.id;
    mySlot = msg.slot;
    connected = true;
    if (msg.platforms) platforms = msg.platforms;
    lobbyOverlay.classList.remove('show');
    const sc = slotColor(mySlot);
    startSpawningCountdown(sc);
    statusEl.textContent = `You are ${sc.icon} ${sc.name} Duck — FIGHT!`;
    statusEl.className = 'connected';
  }

  if (msg.type === 'lobby_update') {
    const ig = msg.inGame ?? 0;
    const mg = msg.maxGame ?? 4;
    const lc = msg.lobbyCount ?? 0;
    gameInfo.inGame = ig;
    gameInfo.maxGame = mg;
    gameInfo.lobbyCount = lc;
    if (inLobby) {
      lobbyPos = msg.yourLobbyPos;
      lobbyPositionEl.textContent = `Queue Position: #${lobbyPos}`;
      lobbyGameInfoEl.textContent = `${ig} / ${mg} players in game · ${lc} waiting`;
    }
  }

  if (msg.type === 'full') {
    statusEl.textContent = 'Server full';
    statusEl.className = 'dead';
  }

  if (msg.type === 'state') {
    serverState = msg;

    // Process events for local effects
    for (const ev of msg.events) {
      if (ev.type === 'shoot') {
        // Muzzle flash
        muzzleFlashes.push({ x: ev.x, y: ev.y, angle: ev.angle, life: 4 });
        // Shell casing
        const ca = ev.angle + (Math.random() - 0.5) * 0.5 + Math.PI / 2;
        casings.push({
          x: ev.x - Math.cos(ev.angle) * 15,
          y: ev.y - Math.sin(ev.angle) * 15,
          vx: Math.cos(ca) * 3, vy: Math.sin(ca) * 3 - 2,
          life: 60, rot: Math.random() * Math.PI * 2,
          rotV: (Math.random() - 0.5) * 0.4,
        });
        // Muzzle particles
        for (let i = 0; i < 6; i++) {
          const pa = ev.angle + (Math.random() - 0.5) * 0.6;
          const spd = 3 + Math.random() * 4;
          particles.push({
            x: ev.x, y: ev.y,
            vx: Math.cos(pa) * spd, vy: Math.sin(pa) * spd,
            life: 10 + Math.random() * 10, maxLife: 20,
            size: 2 + Math.random() * 3,
            color: Math.random() < 0.5 ? '#ffcc00' : '#ff6600',
          });
        }
        if (ev.id === myId) addShake(4, 5);
      }

      if (ev.type === 'hit') {
        for (let k = 0; k < 8; k++) {
          const a = Math.random() * Math.PI * 2;
          const spd = 2 + Math.random() * 3;
          particles.push({
            x: ev.x, y: ev.y,
            vx: Math.cos(a) * spd, vy: Math.sin(a) * spd - 1,
            life: 15 + Math.random() * 10, maxLife: 25,
            size: 2 + Math.random() * 2,
            color: '#ff4444',
          });
        }
        if (ev.target === myId) addShake(6, 6);
      }

      if (ev.type === 'impact') {
        for (let k = 0; k < 5; k++) {
          const a = Math.random() * Math.PI * 2;
          const spd = 1 + Math.random() * 3;
          particles.push({
            x: ev.x, y: ev.y,
            vx: Math.cos(a) * spd, vy: Math.sin(a) * spd - 1,
            life: 10 + Math.random() * 8, maxLife: 18,
            size: 2 + Math.random() * 2,
            color: '#aaaacc',
          });
        }
      }

      if (ev.type === 'death') {
        const dp = msg.players[ev.id];
        if (dp) {
          const sc = slotColor(dp.slot);
          for (let k = 0; k < 20; k++) {
            const a = Math.random() * Math.PI * 2;
            const spd = 2 + Math.random() * 6;
            particles.push({
              x: dp.x + 24, y: dp.y + 26,
              vx: Math.cos(a) * spd, vy: Math.sin(a) * spd - 3,
              life: 25 + Math.random() * 20, maxLife: 45,
              size: 3 + Math.random() * 5,
              color: sc.deathPal[Math.floor(Math.random() * sc.deathPal.length)],
            });
          }
          addShake(8, 10);
          // killer is "p0".."p3" - find that slot
          let killerSlot = 0;
          if (ev.killer === 'p1') killerSlot = 1;
          else if (ev.killer === 'p2') killerSlot = 2;
          else if (ev.killer === 'p3') killerSlot = 3;
          const kName = ev.killer ? slotColor(killerSlot).name : '???';
          deathMessages.push({
            text: ev.fell
              ? `${sc.name} fell off!`
              : ev.replaced
                ? `${sc.name} was removed → lobby player joined!`
                : `${kName} killed ${sc.name}!`,
            life: 180,
          });
        }
      }

      if (ev.type === 'respawn') {
        const rp = msg.players[ev.id];
        if (rp) {
          const sc = slotColor(rp.slot);
          for (let k = 0; k < 12; k++) {
            const a = Math.random() * Math.PI * 2;
            const spd = 1 + Math.random() * 3;
            particles.push({
              x: rp.x + 24, y: rp.y + 26,
              vx: Math.cos(a) * spd, vy: Math.sin(a) * spd - 1,
              life: 20 + Math.random() * 10, maxLife: 30,
              size: 3 + Math.random() * 3,
              color: sc.body,
            });
          }
        }
      }

      if (ev.type === 'spawned') {
        // Player is now active and has 1.5s invuln. Play a spawn burst.
        const sp = msg.players[ev.id];
        if (sp) {
          const sc = slotColor(sp.slot);
          for (let k = 0; k < 18; k++) {
            const a = Math.random() * Math.PI * 2;
            const spd = 2 + Math.random() * 4;
            particles.push({
              x: sp.x + 24, y: sp.y + 26,
              vx: Math.cos(a) * spd, vy: Math.sin(a) * spd - 1,
              life: 18 + Math.random() * 12, maxLife: 30,
              size: 3 + Math.random() * 3,
              color: sc.body,
            });
          }
          addShake(3, 4);
        }
      }
    }

    // Update status
    const pCount = Object.keys(msg.players).length;
    if (pCount < 2) {
      const sc = slotColor(mySlot);
      statusEl.textContent = `You are ${sc.icon} ${sc.name} Duck — Waiting for players... (${pCount}/2)`;
      statusEl.className = 'waiting';
    } else {
      const me = msg.players[myId];
      if (me && !me.alive) {
        statusEl.textContent = `💀 RESPAWNING...`;
        statusEl.className = 'dead';
      } else {
        const sc = slotColor(mySlot);
        statusEl.textContent = `You are ${sc.icon} ${sc.name} Duck — FIGHT! (${pCount}/4)`;
        statusEl.className = 'connected';
      }
    }
  }
};

// ── Input ──
let mouse = { x: 480, y: 320, down: false };
const keys = {};
let isMobile = false;

// Detect mobile/tablet
function checkMobile() {
  isMobile = window.matchMedia('(max-width: 1024px), (hover: none) and (pointer: coarse)').matches;
}
checkMobile();
window.addEventListener('resize', checkMobile);

// ── Desktop mouse input ──
canvas.addEventListener('mousemove', e => {
  const r = canvas.getBoundingClientRect();
  mouse.x = (e.clientX - r.left) * (canvas.width / r.width);
  mouse.y = (e.clientY - r.top) * (canvas.height / r.height);
});
canvas.addEventListener('mousedown', e => { if (e.button === 0) mouse.down = true; });
canvas.addEventListener('mouseup', e => { if (e.button === 0) mouse.down = false; });
canvas.addEventListener('contextmenu', e => e.preventDefault());
window.addEventListener('keydown', e => keys[e.key.toLowerCase()] = true);
window.addEventListener('keyup', e => keys[e.key.toLowerCase()] = false);

// ── Mobile touch: canvas touch = aim + shoot ──
let aimTouchId = null;

canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  for (const t of e.changedTouches) {
    // Any touch on the canvas = aim + shoot
    if (aimTouchId === null) {
      aimTouchId = t.identifier;
      const r = canvas.getBoundingClientRect();
      mouse.x = (t.clientX - r.left) * (canvas.width / r.width);
      mouse.y = (t.clientY - r.top) * (canvas.height / r.height);
      mouse.down = true;
    }
  }
}, { passive: false });

canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  for (const t of e.changedTouches) {
    if (t.identifier === aimTouchId) {
      const r = canvas.getBoundingClientRect();
      mouse.x = (t.clientX - r.left) * (canvas.width / r.width);
      mouse.y = (t.clientY - r.top) * (canvas.height / r.height);
    }
  }
}, { passive: false });

canvas.addEventListener('touchend', e => {
  for (const t of e.changedTouches) {
    if (t.identifier === aimTouchId) {
      aimTouchId = null;
      mouse.down = false;
    }
  }
});
canvas.addEventListener('touchcancel', e => {
  for (const t of e.changedTouches) {
    if (t.identifier === aimTouchId) {
      aimTouchId = null;
      mouse.down = false;
    }
  }
});

// ── Mobile joystick ──
const joystickZone = document.getElementById('joystick-zone');
const joystickBase = document.getElementById('joystick-base');
const joystickKnob = document.getElementById('joystick-knob');

let joystickTouchId = null;
let joystickInput = { left: false, right: false };
const JOYSTICK_RADIUS = 70;  // half of base size
const KNOB_MAX = 40;         // max travel from center
const DEAD_ZONE = 10;        // pixels before registering input

function resetKnob() {
  joystickKnob.style.left = '42px';
  joystickKnob.style.top = '42px';
  joystickInput.left = false;
  joystickInput.right = false;
}

joystickZone.addEventListener('touchstart', e => {
  e.preventDefault();
  e.stopPropagation();
  if (joystickTouchId !== null) return;
  const t = e.changedTouches[0];
  joystickTouchId = t.identifier;
  handleJoystickMove(t);
}, { passive: false });

joystickZone.addEventListener('touchmove', e => {
  e.preventDefault();
  e.stopPropagation();
  for (const t of e.changedTouches) {
    if (t.identifier === joystickTouchId) {
      handleJoystickMove(t);
    }
  }
}, { passive: false });

joystickZone.addEventListener('touchend', e => {
  for (const t of e.changedTouches) {
    if (t.identifier === joystickTouchId) {
      joystickTouchId = null;
      resetKnob();
    }
  }
});
joystickZone.addEventListener('touchcancel', e => {
  for (const t of e.changedTouches) {
    if (t.identifier === joystickTouchId) {
      joystickTouchId = null;
      resetKnob();
    }
  }
});

function handleJoystickMove(touch) {
  const rect = joystickBase.getBoundingClientRect();
  const centerX = rect.left + JOYSTICK_RADIUS;
  const centerY = rect.top + JOYSTICK_RADIUS;
  let dx = touch.clientX - centerX;
  let dy = touch.clientY - centerY;

  // Clamp to max radius
  const dist = Math.sqrt(dx * dx + dy * dy);
  if (dist > KNOB_MAX) {
    dx = (dx / dist) * KNOB_MAX;
    dy = (dy / dist) * KNOB_MAX;
  }

  // Position knob (knob is 56px, so offset by 28 from center which is 70)
  joystickKnob.style.left = (JOYSTICK_RADIUS - 28 + dx) + 'px';
  joystickKnob.style.top = (JOYSTICK_RADIUS - 28 + dy) + 'px';

  // Only horizontal movement matters
  joystickInput.left = dx < -DEAD_ZONE;
  joystickInput.right = dx > DEAD_ZONE;
}

// Send input to server
setInterval(() => {
  if (!connected || ws.readyState !== 1) return;
  if (inLobby) return; // lobby players don't send input
  if (spawningActive) return; // locked during spawn countdown
  ws.send(JSON.stringify({
    type: 'input',
    left: keys['a'] || keys['arrowleft'] || joystickInput.left,
    right: keys['d'] || keys['arrowright'] || joystickInput.right,
    mx: mouse.x,
    my: mouse.y,
    shoot: mouse.down,
  }));
}, 1000 / 60);

// ── Local effects ──
const particles = [];
const casings = [];
const muzzleFlashes = [];
const deathMessages = [];

let shake = { x: 0, y: 0, intensity: 0, timer: 0 };
function addShake(intensity, duration) {
  shake.intensity = Math.max(shake.intensity, intensity);
  shake.timer = Math.max(shake.timer, duration);
}

// ── Stars ──
const stars = [];
for (let i = 0; i < 80; i++) {
  stars.push({
    x: Math.random() * canvas.width,
    y: Math.random() * canvas.height,
    size: Math.random() * 2 + 1,
    twinkle: Math.random() * Math.PI * 2,
  });
}

// ── Pixel duck sprites ──
function createDuckSprite(flip, bodyColor, darkColor, bellyColor) {
  const s = 4;
  const c = document.createElement('canvas');
  c.width = 16 * s; c.height = 16 * s;
  const cx = c.getContext('2d');
  cx.imageSmoothingEnabled = false;

  const px = [
    { x: 5, y: 6, w: 6, h: 7, c: bodyColor },
    { x: 4, y: 7, w: 8, h: 5, c: bodyColor },
    { x: 6, y: 9, w: 4, h: 3, c: bellyColor },
    { x: 6, y: 3, w: 5, h: 4, c: bodyColor },
    { x: 5, y: 4, w: 7, h: 3, c: bodyColor },
    { x: 9, y: 4, w: 1, h: 1, c: '#ffffff' },
    { x: 10, y: 4, w: 1, h: 1, c: '#1a1a2e' },
    { x: 11, y: 5, w: 3, h: 1, c: '#e8882f' },
    { x: 11, y: 6, w: 2, h: 1, c: '#e8882f' },
    { x: 4, y: 8, w: 2, h: 3, c: darkColor },
    { x: 3, y: 6, w: 2, h: 2, c: darkColor },
    { x: 6, y: 13, w: 2, h: 1, c: '#e8882f' },
    { x: 5, y: 14, w: 3, h: 1, c: '#e8882f' },
    { x: 9, y: 13, w: 2, h: 1, c: '#e8882f' },
    { x: 8, y: 14, w: 3, h: 1, c: '#e8882f' },
  ];

  px.forEach(p => {
    cx.fillStyle = p.c;
    if (flip) {
      cx.fillRect((15 - p.x - p.w + 1) * s, p.y * s, p.w * s, p.h * s);
    } else {
      cx.fillRect(p.x * s, p.y * s, p.w * s, p.h * s);
    }
  });
  return c;
}

// Pre-build duck sprites for all 4 slots (right and left)
const duckSprites = SLOT_COLORS.map(c => ({
  r: createDuckSprite(false, c.body, c.dark, c.light),
  l: createDuckSprite(true,  c.body, c.dark, c.light),
}));

function getSprite(slot, facingRight) {
  const s = duckSprites[slot] || duckSprites[0];
  return facingRight ? s.r : s.l;
}

// ── Draw ──
function drawGun(cx, cy, angle, facingRight, recoilTimer, slot) {
  ctx.save();
  ctx.translate(cx, cy);
  ctx.rotate(angle);
  if (!facingRight) ctx.scale(1, -1);

  const kick = recoilTimer > 0 ? recoilTimer * 2 : 0;

  // Gun body
  const sc = slotColor(slot);
  ctx.fillStyle = sc.gunBody;
  ctx.fillRect(8 - kick, -4, 24, 8);
  ctx.fillStyle = sc.gunBarrel;
  ctx.fillRect(28 - kick, -3, 8, 6);
  ctx.fillStyle = '#665544';
  ctx.fillRect(10 - kick, 2, 6, 8);
  ctx.fillStyle = '#333344';
  ctx.fillRect(34 - kick, -2, 3, 4);
  ctx.fillStyle = sc.gunHighlight;
  ctx.fillRect(10 - kick, -4, 20, 2);

  ctx.restore();
}

function draw() {
  // Update local effects
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx; p.y += p.vy;
    p.vy += 0.1; p.vx *= 0.97;
    p.life--;
    if (p.life <= 0) particles.splice(i, 1);
  }
  for (let i = casings.length - 1; i >= 0; i--) {
    const c = casings[i];
    c.x += c.vx; c.y += c.vy;
    c.vy += 0.3; c.rot += c.rotV; c.life--;
    for (const p of platforms) {
      if (c.x > p.x && c.x < p.x + p.w && c.y > p.y && c.y < p.y + 8) {
        c.y = p.y; c.vy *= -0.4; c.vx *= 0.7; c.rotV *= 0.5;
      }
    }
    if (c.life <= 0) casings.splice(i, 1);
  }
  for (let i = muzzleFlashes.length - 1; i >= 0; i--) {
    muzzleFlashes[i].life--;
    if (muzzleFlashes[i].life <= 0) muzzleFlashes.splice(i, 1);
  }
  for (let i = deathMessages.length - 1; i >= 0; i--) {
    deathMessages[i].life--;
    if (deathMessages[i].life <= 0) deathMessages.splice(i, 1);
  }

  // Shake
  if (shake.timer > 0) {
    shake.timer--;
    shake.x = (Math.random() - 0.5) * shake.intensity * 2;
    shake.y = (Math.random() - 0.5) * shake.intensity * 2;
    shake.intensity *= 0.85;
  } else { shake.x = 0; shake.y = 0; }

  ctx.save();
  ctx.translate(shake.x, shake.y);

  // Sky
  const grad = ctx.createLinearGradient(0, 0, 0, canvas.height);
  grad.addColorStop(0, '#0f0c29');
  grad.addColorStop(0.5, '#1a1a3e');
  grad.addColorStop(1, '#24243e');
  ctx.fillStyle = grad;
  ctx.fillRect(-10, -10, canvas.width + 20, canvas.height + 20);

  // Stars
  const time = Date.now() * 0.002;
  for (const s of stars) {
    ctx.globalAlpha = 0.4 + Math.sin(s.twinkle + time) * 0.3;
    ctx.fillStyle = '#ffffff';
    ctx.fillRect(Math.floor(s.x), Math.floor(s.y), s.size, s.size);
  }
  ctx.globalAlpha = 1;

  // Platforms
  for (const p of platforms) {
    ctx.fillStyle = '#3d3d6b';
    ctx.fillRect(p.x, p.y, p.w, p.h);
    ctx.fillStyle = '#5a5a8f';
    ctx.fillRect(p.x, p.y, p.w, 3);
    ctx.fillStyle = '#2d2d5b';
    for (let i = 0; i < p.w; i += 16) {
      ctx.fillRect(p.x + i, p.y + 6, 8, 2);
    }
  }

  // Casings
  for (const c of casings) {
    ctx.save();
    ctx.translate(c.x, c.y);
    ctx.rotate(c.rot);
    ctx.globalAlpha = c.life / 60;
    ctx.fillStyle = '#d4a017';
    ctx.fillRect(-3, -1, 6, 3);
    ctx.fillStyle = '#b8860b';
    ctx.fillRect(-3, -1, 2, 3);
    ctx.globalAlpha = 1;
    ctx.restore();
  }

  // Bullets
  const sBullets = serverState.bullets || [];
  for (const b of sBullets) {
    ctx.fillStyle = '#ffffff';
    ctx.fillRect(b.x - 3, b.y - 3, 6, 6);
    ctx.fillStyle = '#ffcc00';
    ctx.fillRect(b.x - 2, b.y - 2, 4, 4);
  }

  // Muzzle flashes
  for (const m of muzzleFlashes) {
    ctx.save();
    ctx.translate(m.x, m.y);
    ctx.rotate(m.angle);
    const alpha = m.life / 4;
    ctx.globalAlpha = alpha;
    ctx.fillStyle = '#ffffff';
    ctx.fillRect(-4, -6, 20, 12);
    ctx.fillStyle = '#ffcc00';
    ctx.fillRect(-2, -10, 28, 20);
    ctx.globalAlpha = alpha * 0.5;
    ctx.fillStyle = '#ff6600';
    ctx.fillRect(-2, -14, 34, 28);
    ctx.globalAlpha = 1;
    ctx.restore();
  }

  // Players
  const sPlayers = serverState.players || {};
  for (const id in sPlayers) {
    const p = sPlayers[id];
    if (!p.alive) continue;

    const cx = p.x + 24;
    const cy = p.y + 18;
    const facingRight = Math.cos(p.gunAngle) >= 0;

    // Gun
    drawGun(cx, cy, p.gunAngle, facingRight, p.recoilTimer, p.slot);

    // Duck sprite
    const sprite = getSprite(p.slot, facingRight);
    let sx = 1, sy = 1;
    if (p.recoilTimer > 0) {
      const t = p.recoilTimer / 6;
      sx = 1 + t * 0.15;
      sy = 1 - t * 0.1;
    }
    // Invincibility flash effect
    const invuln = p.invulnTimer || 0;
    const flashing = invuln > 0 && Math.floor(Date.now() / 80) % 2 === 0;
    ctx.save();
    ctx.translate(p.x + 24, p.y + 52);
    ctx.scale(sx, sy);
    if (flashing) {
      ctx.globalAlpha = 0.4;
      ctx.drawImage(sprite, -24, -52, 48, 52);
      ctx.globalAlpha = 1;
    } else {
      ctx.drawImage(sprite, -24, -52, 48, 52);
    }
    ctx.restore();

    // Invincibility shield ring
    if (invuln > 0) {
      ctx.save();
      ctx.globalAlpha = 0.5 + Math.sin(Date.now() * 0.02) * 0.25;
      ctx.strokeStyle = '#ffffff';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.arc(p.x + 24, p.y + 26, 32, 0, Math.PI * 2);
      ctx.stroke();
      ctx.restore();
    }

    // HP bar
    const barW = 48;
    const barH = 6;
    const barX = p.x;
    const barY = p.y - 14;
    ctx.fillStyle = '#333';
    ctx.fillRect(barX, barY, barW, barH);
    const hpPct = Math.max(0, p.hp) / 20;
    ctx.fillStyle = hpPct > 0.5 ? '#2ecc71' : (hpPct > 0.25 ? '#f39c12' : '#e74c3c');
    ctx.fillRect(barX, barY, barW * hpPct, barH);
    ctx.strokeStyle = '#555';
    ctx.lineWidth = 1;
    ctx.strokeRect(barX, barY, barW, barH);

    // Name tag
    const sc = slotColor(p.slot);
    ctx.fillStyle = sc.body;
    ctx.font = 'bold 12px monospace';
    ctx.textAlign = 'center';
    const label = (id === myId ? '► YOU ◄' : 'ENEMY') + ` [${Math.max(0,p.hp)}HP]`;
    ctx.fillText(label, p.x + 24, barY - 4);
    ctx.textAlign = 'left';
  }

  // Particles
  for (const p of particles) {
    ctx.globalAlpha = p.life / p.maxLife;
    ctx.fillStyle = p.color;
    ctx.fillRect(p.x - p.size / 2, p.y - p.size / 2, p.size, p.size);
  }
  ctx.globalAlpha = 1;

  // Crosshair
  const myColor = inLobby ? '#888888' : slotColor(mySlot).body;
  ctx.strokeStyle = myColor;
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.arc(mouse.x, mouse.y, 12, 0, Math.PI * 2);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(mouse.x - 18, mouse.y); ctx.lineTo(mouse.x - 8, mouse.y);
  ctx.moveTo(mouse.x + 8, mouse.y); ctx.lineTo(mouse.x + 18, mouse.y);
  ctx.moveTo(mouse.x, mouse.y - 18); ctx.lineTo(mouse.x, mouse.y - 8);
  ctx.moveTo(mouse.x, mouse.y + 8); ctx.lineTo(mouse.x, mouse.y + 18);
  ctx.stroke();
  ctx.fillStyle = myColor;
  ctx.fillRect(mouse.x - 1, mouse.y - 1, 3, 3);

  // ── Scoreboard ──
  const sbX = canvas.width - 230;
  const sbW = 220;
  const sbH = 100;
  ctx.fillStyle = 'rgba(0,0,0,0.5)';
  ctx.fillRect(sbX, 10, sbW, sbH);
  ctx.strokeStyle = '#555';
  ctx.lineWidth = 1;
  ctx.strokeRect(sbX, 10, sbW, sbH);

  ctx.font = 'bold 14px monospace';
  ctx.fillStyle = '#ffffff';
  ctx.fillText('SCOREBOARD', sbX + 10, 28);

  let row = 0;
  for (const id in sPlayers) {
    const p = sPlayers[id];
    const sc = slotColor(p.slot);
    ctx.fillStyle = sc.body;
    const name = sc.name;
    const tag = id === myId ? ' (YOU)' : '';
    ctx.font = '11px monospace';
    ctx.fillText(`${sc.icon} ${name}${tag}: K:${p.kills} D:${p.deaths}`, sbX + 10, 46 + row * 16);
    row++;
  }

  // Death messages
  for (let i = 0; i < deathMessages.length; i++) {
    const dm = deathMessages[i];
    ctx.globalAlpha = Math.min(1, dm.life / 30);
    ctx.fillStyle = '#ffffff';
    ctx.font = 'bold 16px monospace';
    ctx.textAlign = 'center';
    ctx.fillText(dm.text, canvas.width / 2, 60 + i * 24);
    ctx.textAlign = 'left';
  }
  ctx.globalAlpha = 1;

  // Controls
  ctx.fillStyle = '#aaaacc';
  ctx.font = '13px monospace';
  if (!isMobile) {
    ctx.fillText('A/D = Move | SHOOT to fly! 🦆🔫 | Gun recoil = Jump!', 12, canvas.height - 12);
  } else {
    ctx.fillText('Joystick = Move | Touch = Aim & Shoot! 🦆🔫', 12, canvas.height - 12);
  }

  ctx.restore();
}

function startSpawningCountdown(sc) {
  spawningColorEl.textContent = `${sc.icon} ${sc.name} DUCK`;
  spawningColorEl.style.color = sc.body;
  spawningCountdownEl.textContent = '3';
  spawningOverlay.classList.add('show');
  spawningActive = true;
}

function gameLoop() {
  draw();
  // Animate lobby dots
  if (inLobby) {
    const t = Math.floor(Date.now() / 500) % 4;
    const dotStr = ['• • •', '• •', '• • • •', '• • •'][t];
    if (lobbyDotsEl.textContent !== dotStr) lobbyDotsEl.textContent = dotStr;
  }
  // Drive spawning countdown from the server's spawnDelayTimer (authoritative).
  if (spawningActive && !inLobby && myId && serverState.players && serverState.players[myId]) {
    const me = serverState.players[myId];
    if (typeof me.spawnDelayTimer === 'number') {
      const remaining = Math.max(0, me.spawnDelayTimer);
      const seconds = Math.ceil(remaining);
      const label = seconds > 0 ? String(seconds) : 'GO!';
      if (spawningCountdownEl.textContent !== label) {
        spawningCountdownEl.textContent = label;
        spawningCountdownEl.style.transform = 'scale(1.3)';
        setTimeout(() => { spawningCountdownEl.style.transform = 'scale(1)'; }, 150);
      }
      if (remaining <= 0) {
        spawningActive = false;
        spawningOverlay.classList.remove('show');
      }
    }
  }
  requestAnimationFrame(gameLoop);
}
requestAnimationFrame(gameLoop);
</script>
</body>
</html>
