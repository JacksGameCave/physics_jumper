<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Duck Fight!</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0f0c29;
    display: flex; flex-direction: column;
    justify-content: center; align-items: center;
    height: 100vh; overflow: hidden;
    font-family: monospace; color: #fff;
  }
  canvas { border: 2px solid #e94560; cursor: crosshair; image-rendering: pixelated; }
  #status {
    margin-bottom: 10px; font-size: 16px;
    padding: 6px 16px; background: #1a1a3e; border-radius: 6px;
    border: 1px solid #333;
  }
  .waiting { color: #ffcc00; }
  .connected { color: #2ecc71; }
  .dead { color: #e74c3c; }
</style>
</head>
<body>
<div id="status" class="waiting">Connecting...</div>
<canvas id="game"></canvas>
<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const statusEl = document.getElementById('status');
canvas.width = 960;
canvas.height = 640;

// ── WebSocket ──
const protocol = location.protocol === 'https:' ? 'wss' : 'ws';
const ws = new WebSocket(`${protocol}://${location.host}`);
let myId = null;
let mySlot = -1;
let platforms = [];
let serverState = { players: {}, bullets: [], events: [] };
let connected = false;

ws.onopen = () => { statusEl.textContent = 'Waiting for opponent...'; statusEl.className = 'waiting'; };
ws.onclose = () => { statusEl.textContent = 'Disconnected'; statusEl.className = 'dead'; connected = false; };
ws.onerror = () => { statusEl.textContent = 'Connection error'; statusEl.className = 'dead'; };

ws.onmessage = (e) => {
  const msg = JSON.parse(e.data);

  if (msg.type === 'init') {
    myId = msg.id;
    mySlot = msg.slot;
    platforms = msg.platforms;
    connected = true;
    statusEl.textContent = `You are ${mySlot === 0 ? '🔵 BLUE' : '🔴 RED'} Duck — Waiting for opponent...`;
    statusEl.className = 'waiting';
  }

  if (msg.type === 'full') {
    statusEl.textContent = 'Server full (2/2 players)';
    statusEl.className = 'dead';
  }

  if (msg.type === 'state') {
    serverState = msg;

    // Process events for local effects
    for (const ev of msg.events) {
      if (ev.type === 'shoot') {
        // Muzzle flash
        muzzleFlashes.push({ x: ev.x, y: ev.y, angle: ev.angle, life: 4 });
        // Shell casing
        const ca = ev.angle + (Math.random() - 0.5) * 0.5 + Math.PI / 2;
        casings.push({
          x: ev.x - Math.cos(ev.angle) * 15,
          y: ev.y - Math.sin(ev.angle) * 15,
          vx: Math.cos(ca) * 3, vy: Math.sin(ca) * 3 - 2,
          life: 60, rot: Math.random() * Math.PI * 2,
          rotV: (Math.random() - 0.5) * 0.4,
        });
        // Muzzle particles
        for (let i = 0; i < 6; i++) {
          const pa = ev.angle + (Math.random() - 0.5) * 0.6;
          const spd = 3 + Math.random() * 4;
          particles.push({
            x: ev.x, y: ev.y,
            vx: Math.cos(pa) * spd, vy: Math.sin(pa) * spd,
            life: 10 + Math.random() * 10, maxLife: 20,
            size: 2 + Math.random() * 3,
            color: Math.random() < 0.5 ? '#ffcc00' : '#ff6600',
          });
        }
        if (ev.id === myId) addShake(4, 5);
      }

      if (ev.type === 'hit') {
        for (let k = 0; k < 8; k++) {
          const a = Math.random() * Math.PI * 2;
          const spd = 2 + Math.random() * 3;
          particles.push({
            x: ev.x, y: ev.y,
            vx: Math.cos(a) * spd, vy: Math.sin(a) * spd - 1,
            life: 15 + Math.random() * 10, maxLife: 25,
            size: 2 + Math.random() * 2,
            color: '#ff4444',
          });
        }
        if (ev.target === myId) addShake(6, 6);
      }

      if (ev.type === 'impact') {
        for (let k = 0; k < 5; k++) {
          const a = Math.random() * Math.PI * 2;
          const spd = 1 + Math.random() * 3;
          particles.push({
            x: ev.x, y: ev.y,
            vx: Math.cos(a) * spd, vy: Math.sin(a) * spd - 1,
            life: 10 + Math.random() * 8, maxLife: 18,
            size: 2 + Math.random() * 2,
            color: '#aaaacc',
          });
        }
      }

      if (ev.type === 'death') {
        const dp = msg.players[ev.id];
        if (dp) {
          for (let k = 0; k < 20; k++) {
            const a = Math.random() * Math.PI * 2;
            const spd = 2 + Math.random() * 6;
            const col = dp.slot === 0 ? ['#4488ff','#66aaff','#2266dd','#ffffff'] : ['#ff4444','#ff6666','#dd2222','#ffffff'];
            particles.push({
              x: dp.x + 24, y: dp.y + 26,
              vx: Math.cos(a) * spd, vy: Math.sin(a) * spd - 3,
              life: 25 + Math.random() * 20, maxLife: 45,
              size: 3 + Math.random() * 5,
              color: col[Math.floor(Math.random() * col.length)],
            });
          }
          addShake(8, 10);
          deathMessages.push({
            text: ev.fell
              ? `${dp.slot === 0 ? 'BLUE' : 'RED'} fell off!`
              : `${ev.killer === 'p0' ? 'BLUE' : 'RED'} killed ${dp.slot === 0 ? 'BLUE' : 'RED'}!`,
            life: 180,
          });
        }
      }

      if (ev.type === 'respawn') {
        const rp = msg.players[ev.id];
        if (rp) {
          for (let k = 0; k < 12; k++) {
            const a = Math.random() * Math.PI * 2;
            const spd = 1 + Math.random() * 3;
            const col = rp.slot === 0 ? '#4488ff' : '#ff4444';
            particles.push({
              x: rp.x + 24, y: rp.y + 26,
              vx: Math.cos(a) * spd, vy: Math.sin(a) * spd - 1,
              life: 20 + Math.random() * 10, maxLife: 30,
              size: 3 + Math.random() * 3,
              color: col,
            });
          }
        }
      }
    }

    // Update status
    const pCount = Object.keys(msg.players).length;
    if (pCount < 2) {
      statusEl.textContent = `You are ${mySlot === 0 ? '🔵 BLUE' : '🔴 RED'} Duck — Waiting for opponent...`;
      statusEl.className = 'waiting';
    } else {
      const me = msg.players[myId];
      if (me && !me.alive) {
        statusEl.textContent = `💀 RESPAWNING...`;
        statusEl.className = 'dead';
      } else {
        statusEl.textContent = `You are ${mySlot === 0 ? '🔵 BLUE' : '🔴 RED'} Duck — FIGHT!`;
        statusEl.className = 'connected';
      }
    }
  }
};

// ── Input ──
let mouse = { x: 480, y: 320, down: false };
const keys = {};

canvas.addEventListener('mousemove', e => {
  const r = canvas.getBoundingClientRect();
  mouse.x = (e.clientX - r.left) * (canvas.width / r.width);
  mouse.y = (e.clientY - r.top) * (canvas.height / r.height);
});
canvas.addEventListener('mousedown', e => { if (e.button === 0) mouse.down = true; });
canvas.addEventListener('mouseup', e => { if (e.button === 0) mouse.down = false; });
canvas.addEventListener('contextmenu', e => e.preventDefault());
window.addEventListener('keydown', e => keys[e.key.toLowerCase()] = true);
window.addEventListener('keyup', e => keys[e.key.toLowerCase()] = false);

// Send input to server
setInterval(() => {
  if (!connected || ws.readyState !== 1) return;
  ws.send(JSON.stringify({
    type: 'input',
    left: keys['a'] || keys['arrowleft'],
    right: keys['d'] || keys['arrowright'],
    mx: mouse.x,
    my: mouse.y,
    shoot: mouse.down,
  }));
}, 1000 / 60);

// ── Local effects ──
const particles = [];
const casings = [];
const muzzleFlashes = [];
const deathMessages = [];

let shake = { x: 0, y: 0, intensity: 0, timer: 0 };
function addShake(intensity, duration) {
  shake.intensity = Math.max(shake.intensity, intensity);
  shake.timer = Math.max(shake.timer, duration);
}

// ── Stars ──
const stars = [];
for (let i = 0; i < 80; i++) {
  stars.push({
    x: Math.random() * canvas.width,
    y: Math.random() * canvas.height,
    size: Math.random() * 2 + 1,
    twinkle: Math.random() * Math.PI * 2,
  });
}

// ── Pixel duck sprites ──
function createDuckSprite(flip, bodyColor, darkColor, bellyColor) {
  const s = 4;
  const c = document.createElement('canvas');
  c.width = 16 * s; c.height = 16 * s;
  const cx = c.getContext('2d');
  cx.imageSmoothingEnabled = false;

  const px = [
    { x: 5, y: 6, w: 6, h: 7, c: bodyColor },
    { x: 4, y: 7, w: 8, h: 5, c: bodyColor },
    { x: 6, y: 9, w: 4, h: 3, c: bellyColor },
    { x: 6, y: 3, w: 5, h: 4, c: bodyColor },
    { x: 5, y: 4, w: 7, h: 3, c: bodyColor },
    { x: 9, y: 4, w: 1, h: 1, c: '#ffffff' },
    { x: 10, y: 4, w: 1, h: 1, c: '#1a1a2e' },
    { x: 11, y: 5, w: 3, h: 1, c: '#e8882f' },
    { x: 11, y: 6, w: 2, h: 1, c: '#e8882f' },
    { x: 4, y: 8, w: 2, h: 3, c: darkColor },
    { x: 3, y: 6, w: 2, h: 2, c: darkColor },
    { x: 6, y: 13, w: 2, h: 1, c: '#e8882f' },
    { x: 5, y: 14, w: 3, h: 1, c: '#e8882f' },
    { x: 9, y: 13, w: 2, h: 1, c: '#e8882f' },
    { x: 8, y: 14, w: 3, h: 1, c: '#e8882f' },
  ];

  px.forEach(p => {
    cx.fillStyle = p.c;
    if (flip) {
      cx.fillRect((15 - p.x - p.w + 1) * s, p.y * s, p.w * s, p.h * s);
    } else {
      cx.fillRect(p.x * s, p.y * s, p.w * s, p.h * s);
    }
  });
  return c;
}

// Blue duck sprites
const blueR = createDuckSprite(false, '#4488ff', '#2266cc', '#88bbff');
const blueL = createDuckSprite(true, '#4488ff', '#2266cc', '#88bbff');
// Red duck sprites
const redR = createDuckSprite(false, '#ee4444', '#bb2222', '#ff8888');
const redL = createDuckSprite(true, '#ee4444', '#bb2222', '#ff8888');

function getSprite(slot, facingRight) {
  if (slot === 0) return facingRight ? blueR : blueL;
  return facingRight ? redR : redL;
}

// ── Draw ──
function drawGun(cx, cy, angle, facingRight, recoilTimer, slot) {
  ctx.save();
  ctx.translate(cx, cy);
  ctx.rotate(angle);
  if (!facingRight) ctx.scale(1, -1);

  const kick = recoilTimer > 0 ? recoilTimer * 2 : 0;

  // Gun body
  ctx.fillStyle = slot === 0 ? '#4466aa' : '#aa4444';
  ctx.fillRect(8 - kick, -4, 24, 8);
  ctx.fillStyle = slot === 0 ? '#335599' : '#993333';
  ctx.fillRect(28 - kick, -3, 8, 6);
  ctx.fillStyle = '#665544';
  ctx.fillRect(10 - kick, 2, 6, 8);
  ctx.fillStyle = '#333344';
  ctx.fillRect(34 - kick, -2, 3, 4);
  ctx.fillStyle = slot === 0 ? '#5577bb' : '#bb5555';
  ctx.fillRect(10 - kick, -4, 20, 2);

  ctx.restore();
}

function draw() {
  // Update local effects
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx; p.y += p.vy;
    p.vy += 0.1; p.vx *= 0.97;
    p.life--;
    if (p.life <= 0) particles.splice(i, 1);
  }
  for (let i = casings.length - 1; i >= 0; i--) {
    const c = casings[i];
    c.x += c.vx; c.y += c.vy;
    c.vy += 0.3; c.rot += c.rotV; c.life--;
    for (const p of platforms) {
      if (c.x > p.x && c.x < p.x + p.w && c.y > p.y && c.y < p.y + 8) {
        c.y = p.y; c.vy *= -0.4; c.vx *= 0.7; c.rotV *= 0.5;
      }
    }
    if (c.life <= 0) casings.splice(i, 1);
  }
  for (let i = muzzleFlashes.length - 1; i >= 0; i--) {
    muzzleFlashes[i].life--;
    if (muzzleFlashes[i].life <= 0) muzzleFlashes.splice(i, 1);
  }
  for (let i = deathMessages.length - 1; i >= 0; i--) {
    deathMessages[i].life--;
    if (deathMessages[i].life <= 0) deathMessages.splice(i, 1);
  }

  // Shake
  if (shake.timer > 0) {
    shake.timer--;
    shake.x = (Math.random() - 0.5) * shake.intensity * 2;
    shake.y = (Math.random() - 0.5) * shake.intensity * 2;
    shake.intensity *= 0.85;
  } else { shake.x = 0; shake.y = 0; }

  ctx.save();
  ctx.translate(shake.x, shake.y);

  // Sky
  const grad = ctx.createLinearGradient(0, 0, 0, canvas.height);
  grad.addColorStop(0, '#0f0c29');
  grad.addColorStop(0.5, '#1a1a3e');
  grad.addColorStop(1, '#24243e');
  ctx.fillStyle = grad;
  ctx.fillRect(-10, -10, canvas.width + 20, canvas.height + 20);

  // Stars
  const time = Date.now() * 0.002;
  for (const s of stars) {
    ctx.globalAlpha = 0.4 + Math.sin(s.twinkle + time) * 0.3;
    ctx.fillStyle = '#ffffff';
    ctx.fillRect(Math.floor(s.x), Math.floor(s.y), s.size, s.size);
  }
  ctx.globalAlpha = 1;

  // Platforms
  for (const p of platforms) {
    ctx.fillStyle = '#3d3d6b';
    ctx.fillRect(p.x, p.y, p.w, p.h);
    ctx.fillStyle = '#5a5a8f';
    ctx.fillRect(p.x, p.y, p.w, 3);
    ctx.fillStyle = '#2d2d5b';
    for (let i = 0; i < p.w; i += 16) {
      ctx.fillRect(p.x + i, p.y + 6, 8, 2);
    }
  }

  // Casings
  for (const c of casings) {
    ctx.save();
    ctx.translate(c.x, c.y);
    ctx.rotate(c.rot);
    ctx.globalAlpha = c.life / 60;
    ctx.fillStyle = '#d4a017';
    ctx.fillRect(-3, -1, 6, 3);
    ctx.fillStyle = '#b8860b';
    ctx.fillRect(-3, -1, 2, 3);
    ctx.globalAlpha = 1;
    ctx.restore();
  }

  // Bullets
  const sBullets = serverState.bullets || [];
  for (const b of sBullets) {
    ctx.fillStyle = '#ffffff';
    ctx.fillRect(b.x - 3, b.y - 3, 6, 6);
    ctx.fillStyle = '#ffcc00';
    ctx.fillRect(b.x - 2, b.y - 2, 4, 4);
  }

  // Muzzle flashes
  for (const m of muzzleFlashes) {
    ctx.save();
    ctx.translate(m.x, m.y);
    ctx.rotate(m.angle);
    const alpha = m.life / 4;
    ctx.globalAlpha = alpha;
    ctx.fillStyle = '#ffffff';
    ctx.fillRect(-4, -6, 20, 12);
    ctx.fillStyle = '#ffcc00';
    ctx.fillRect(-2, -10, 28, 20);
    ctx.globalAlpha = alpha * 0.5;
    ctx.fillStyle = '#ff6600';
    ctx.fillRect(-2, -14, 34, 28);
    ctx.globalAlpha = 1;
    ctx.restore();
  }

  // Players
  const sPlayers = serverState.players || {};
  for (const id in sPlayers) {
    const p = sPlayers[id];
    if (!p.alive) continue;

    const cx = p.x + 24;
    const cy = p.y + 18;
    const facingRight = Math.cos(p.gunAngle) >= 0;

    // Gun
    drawGun(cx, cy, p.gunAngle, facingRight, p.recoilTimer, p.slot);

    // Duck sprite
    const sprite = getSprite(p.slot, facingRight);
    let sx = 1, sy = 1;
    if (p.recoilTimer > 0) {
      const t = p.recoilTimer / 6;
      sx = 1 + t * 0.15;
      sy = 1 - t * 0.1;
    }
    ctx.save();
    ctx.translate(p.x + 24, p.y + 52);
    ctx.scale(sx, sy);
    ctx.drawImage(sprite, -24, -52, 48, 52);
    ctx.restore();

    // HP bar
    const barW = 48;
    const barH = 6;
    const barX = p.x;
    const barY = p.y - 14;
    ctx.fillStyle = '#333';
    ctx.fillRect(barX, barY, barW, barH);
    const hpPct = Math.max(0, p.hp) / 20;
    ctx.fillStyle = hpPct > 0.5 ? '#2ecc71' : (hpPct > 0.25 ? '#f39c12' : '#e74c3c');
    ctx.fillRect(barX, barY, barW * hpPct, barH);
    ctx.strokeStyle = '#555';
    ctx.lineWidth = 1;
    ctx.strokeRect(barX, barY, barW, barH);

    // Name tag
    ctx.fillStyle = p.slot === 0 ? '#4488ff' : '#ee4444';
    ctx.font = 'bold 12px monospace';
    ctx.textAlign = 'center';
    const label = (id === myId ? '► YOU ◄' : 'ENEMY') + ` [${Math.max(0,p.hp)}HP]`;
    ctx.fillText(label, p.x + 24, barY - 4);
    ctx.textAlign = 'left';
  }

  // Particles
  for (const p of particles) {
    ctx.globalAlpha = p.life / p.maxLife;
    ctx.fillStyle = p.color;
    ctx.fillRect(p.x - p.size / 2, p.y - p.size / 2, p.size, p.size);
  }
  ctx.globalAlpha = 1;

  // Crosshair
  ctx.strokeStyle = mySlot === 0 ? '#4488ff' : '#ee4444';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.arc(mouse.x, mouse.y, 12, 0, Math.PI * 2);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(mouse.x - 18, mouse.y); ctx.lineTo(mouse.x - 8, mouse.y);
  ctx.moveTo(mouse.x + 8, mouse.y); ctx.lineTo(mouse.x + 18, mouse.y);
  ctx.moveTo(mouse.x, mouse.y - 18); ctx.lineTo(mouse.x, mouse.y - 8);
  ctx.moveTo(mouse.x, mouse.y + 8); ctx.lineTo(mouse.x, mouse.y + 18);
  ctx.stroke();
  ctx.fillStyle = mySlot === 0 ? '#4488ff' : '#ee4444';
  ctx.fillRect(mouse.x - 1, mouse.y - 1, 3, 3);

  // ── Scoreboard ──
  ctx.fillStyle = 'rgba(0,0,0,0.5)';
  ctx.fillRect(canvas.width - 220, 10, 210, 80);
  ctx.strokeStyle = '#555';
  ctx.lineWidth = 1;
  ctx.strokeRect(canvas.width - 220, 10, 210, 80);

  ctx.font = 'bold 14px monospace';
  ctx.fillStyle = '#ffffff';
  ctx.fillText('SCOREBOARD', canvas.width - 210, 28);

  let row = 0;
  for (const id in sPlayers) {
    const p = sPlayers[id];
    ctx.fillStyle = p.slot === 0 ? '#4488ff' : '#ee4444';
    const name = p.slot === 0 ? 'BLUE' : 'RED';
    const tag = id === myId ? ' (YOU)' : '';
    ctx.font = '12px monospace';
    ctx.fillText(`${name}${tag}: K:${p.kills} D:${p.deaths}`, canvas.width - 210, 48 + row * 18);
    row++;
  }

  // Death messages
  for (let i = 0; i < deathMessages.length; i++) {
    const dm = deathMessages[i];
    ctx.globalAlpha = Math.min(1, dm.life / 30);
    ctx.fillStyle = '#ffffff';
    ctx.font = 'bold 16px monospace';
    ctx.textAlign = 'center';
    ctx.fillText(dm.text, canvas.width / 2, 60 + i * 24);
    ctx.textAlign = 'left';
  }
  ctx.globalAlpha = 1;

  // Controls
  ctx.fillStyle = '#aaaacc';
  ctx.font = '13px monospace';
  ctx.fillText('A/D = Move | SHOOT to fly! 🦆🔫 | Gun recoil = Jump!', 12, canvas.height - 12);

  ctx.restore();
}

function gameLoop() {
  draw();
  requestAnimationFrame(gameLoop);
}
requestAnimationFrame(gameLoop);
</script>
</body>
</html>
